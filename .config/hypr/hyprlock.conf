general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper.jpg
    blur_size = 4
    blur_passes = 3
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.16
    outer_color = rgba(137, 180, 250, 0.3)
    inner_color = rgba(10, 16, 28, 0.85)
    font_color = rgb(204, 224, 255)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##a9c1d9">Password</span>
    hide_input = false
    rounding = 10
    check_color = rgb(116, 199, 236)
    fail_color = rgb(243, 139, 168)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(249, 226, 175)
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = JetBrains Mono
    color = rgba(204, 224, 255, 0.9)
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22
    font_family = JetBrains Mono
    color = rgba(169, 193, 217, 0.8)
    position = 0, 110
    halign = center
    valign = center
}
