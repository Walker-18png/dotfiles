# Font
font_family      JetBrains Mono
font_size        11.0

# Cursor
cursor                  #89b4fa
cursor_text_color       #0a101c
cursor_blink_interval   0

# Window
background_opacity      0.88
dynamic_background_opacity yes
window_padding_width    12

# Colors
foreground              #a9c1d9
background              #0a101c
selection_foreground    #0a101c
selection_background    #89b4fa

# Black
color0  #0d1520
color8  #1e2a3a

# Red
color1  #f28779
color9  #f28779

# Green
color2  #7dcfb6
color10 #7dcfb6

# Yellow
color3  #f7c67f
color11 #f7c67f

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #a277ff
color13 #a277ff

# Cyan
color6  #74c7ec
color14 #7dcfff

# White
color7  #a9c1d9
color15 #cce0ff

# Tab bar
tab_bar_style               powerline
tab_powerline_style         slanted
active_tab_foreground       #0a101c
active_tab_background       #89b4fa
inactive_tab_foreground     #4a6a8a
inactive_tab_background     #0d1520

# Misc
enable_audio_bell           no
confirm_os_window_close 0
